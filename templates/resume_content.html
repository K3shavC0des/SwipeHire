<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 14px; line-height: 1.6; color: #e5e5e5; background: #1a1a1a;
            padding: 32px 40px;
        }
        h1 { font-size: 22px; margin-bottom: 2px; }
        h2 { font-size: 16px; color: #999; font-weight: 400; margin-bottom: 20px; }
        pre {
            white-space: pre-wrap; word-wrap: break-word;
            font-family: inherit; font-size: 13px; color: #ccc;
        }
    </style>
</head>
<body>
    <h1>{{ name }}</h1>
    {% if role %}<h2>{{ role }}</h2>{% endif %}
    <pre>{{ content }}</pre>
</body>
</html>
