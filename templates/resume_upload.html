{% extends "layout.html" %}

{% block body %}
<div class="form-container">
    <h2>Upload a Resume</h2>
    <form action="/add_resume" method="post" enctype="multipart/form-data">
        <input name="name" type="text" placeholder="Candidate's full name" autofocus autocomplete="off" required>
        <input name="role" type="text" placeholder="Role / position" autocomplete="off" required>
        <p class="text-muted" style="margin-bottom:10px;font-size:.88rem;">Accepts PDF files only.</p>
        <input name="resume" type="file" accept=".pdf" required>
        <button type="submit">Upload</button>
    </form>
</div>
{% endblock %}
